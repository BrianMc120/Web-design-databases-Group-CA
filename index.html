<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase Data Display</title>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

  <!-- App script -->
  <script defer>
    // 1) Connect to Supabase
    const SUPABASE_URL = "https://gzwonzdgrppqajhrcjjd.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6d29uemRncnBwcWFqaHJjampkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzI5MTUsImV4cCI6MjA5MTE0ODkxNX0.5a7CitgvIY4zZt2u7IdtHtRT9Djqz6aRd6FMJaUoIWo";

    let supabaseClient;

    window.addEventListener("DOMContentLoaded", async () => {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      await loadStudents();
    });

    // 2) Fetch and render
    async function loadStudents() {
      const tableBody = document.getElementById("student-table");
      const statusEl = document.getElementById("status");
      tableBody.innerHTML = '<tr><td colspan="9">Loading data…</td></tr>';

      const { data, error } = await supabaseClient
        .from("students") // make sure this matches your table
        .select("first_name, last_name, student_id, email, phone, address_line1, address_line2,county") // adjust columns as needed
        .order("student_id", { ascending: true });

      if (error) {
        console.error("Error fetching data:", error);
        tableBody.innerHTML = '<tr><td colspan="9">Error loading data</td></tr>';
        statusEl.textContent = error.message || "Query failed";
        return;
      }

      if (!data || data.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="9">No students found</td></tr>';
        statusEl.textContent = "Tip: add a few rows in the Table Editor.";
        return;
      }

      tableBody.innerHTML = "";
      data.forEach((product) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${product.student_id ?? ""}</td>
          <td>${product.first_name ?? ""}</td>
          <td>${product.last_name ?? ""}</td>
          <td>${product.email ?? ""}</td>
          <td>${product.phone ?? ""}</td>
          <td>${product.address_line1 ?? ""}</td>
          <td>${product.address_line2 ?? ""}</td>
          <td>${product.county ?? ""}</td>
          `;
        tableBody.appendChild(row);
      });
      statusEl.textContent = "";
    }
  </script>
</head>

<body>
  <h1>Students</h1>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>first name</th>
        <th>last name</th>
        <th>email</th>
        <th>phone</th>
        <th>address line 1</th>
        <th>address line 2</th>
        <th>county</th>
      </tr>
    </thead>
    <tbody id="student-table">
      <tr>
        <td colspan="9">Loading data…</td>
      </tr>
    </tbody>
  </table>

  <div id="status" class="status"></div>
</body>

</html>
